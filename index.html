<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مقارنة شاملة بين التقريرين</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
h2 { text-align: center; }

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  padding: 40px 20px;
  color: #fff;
  background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url("https://raw.githubusercontent.com/xhhp1/mechanics/main/images/mechan.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

.container {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 1500px;
  margin: auto;
}

.box {
  flex: 0 1 600px;
  min-width: 550px;
  padding: 30px;
  border-radius: 18px;
  background: rgba(30, 41, 59, 0.85);
  backdrop-filter: blur(6px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

textarea {
  width: 100%;
  height: 550px;
  padding: 18px;
  border-radius: 12px;
  resize: none;
  font-family: 'Cairo', sans-serif;
  background: rgba(15, 23, 42, 0.9);
  color: #fff;
}

button {
  display: block;
  margin: 40px auto;
  padding: 15px 45px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
}

.result {
  margin: 40px auto 0;
  padding: 25px;
  border-radius: 18px;
  background: rgba(30, 41, 59, 0.85);
  max-width: 1200px;
}

.missing {
  background: rgba(239,68,68,0.15);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  color: #ff6b6b;
  font-weight: bold;
}

hr {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.1);
  margin: 15px 0;
}
</style>
</head>

<body>

<h2>📊 مقارنة تقارير الإشراف والعمليات</h2>

<div class="container">
  <div class="box">
    <h3>تقرير الإشراف</h3>
    <textarea id="supervision"></textarea>
  </div>

  <div class="box">
    <h3>تقرير العمليات</h3>
    <textarea id="operations"></textarea>
  </div>
</div>

<button onclick="compare()">قارن الآن</button>

<div class="result" id="result"></div>

<script>

function clean(text){

  const ignoreSections = [
    "مسؤول افتتاح المتجر",
    "المشرف الميداني بروم الكراج",
    "مشرف المنطقة بروم الكراج",
    "مشرف المتدرب بروم الكراج"
  ];

  let lines = text.split("\n");

  lines = lines.filter(line => {
    const l = line.trim();
    return !ignoreSections.some(word => l.includes(word));
  });

  text = lines.join("\n");

  return text
    .replace(/\*\*/g,"")
    .replace(/ـ+/g,"")
    .replace(/\[.*?\]\(.*?\)/g,"");
}

function normalizeLabel(label){

  label = label
    .replace(/[إأآا]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/[()]/g, "")
    .replace(/\s+/g, " ")
    .replace(/^ال/, "")
    .trim();

  const map = {

    "قياده الكراج": "القياده",
    "قياده": "القياده",
    "قيادة": "القياده",

    "مشرف عام": "اشراف عام",
    "اشراف عام": "اشراف عام",

    "مشرف ميداني": "اشراف ميداني",
    "مشرف الميداني": "اشراف ميداني",
    "اشراف ميداني": "اشراف ميداني",

    "مشرفين المناطق": "اشراف المناطق",
    "مشرف المناطق": "اشراف المناطق",
    "مشرف المنطقة": "اشراف المناطق",

    "مشرفين متدربين": "مشرفين متدربين",

    "السيدات و المعتمدين": "المعتمدين",
    "السيدات والمعتمدين": "المعتمدين",
    "لاعب معتمد": "المعتمدين",

    "عمليات": "العمليات",
    "نائب عمليات": "نائب العمليات",

    "مركز الاتصالات": "مركز الاتصالات",

    "فني ميناء لوس": "ميناء لوس",
    "ميناء لوس": "ميناء لوس",

    "فني ميناء بوليتو": "ميناء بوليتو",
    "ميناء بوليتو": "ميناء بوليتو",

    "بحث والانقاذ": "البحث والانقاذ"

  };

  return map[label] || label;
}

function extractSections(text){

  const sections = {};
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

  let currentOriginal = null;
  let currentNormalized = null;

  const header1 = /^(.+?)\s*:\s*(.*)$/;

  function add(id, normalized, original){
    if (!sections[id]) sections[id] = new Map();
    if (!sections[id].has(normalized)) sections[id].set(normalized, new Set());
    sections[id].get(normalized).add(original);
  }

  for (let line of lines) {

    let m = line.match(header1);

    if (m && !line.startsWith("<@")) {

      currentOriginal = m[1].trim();
      currentNormalized = normalizeLabel(currentOriginal);

      const rest = m[2] || "";
      const idsInline = rest.match(/<@!?\d+>/g) || [];

      for (const id of idsInline){
        add(id, currentNormalized, currentOriginal);
      }

      continue;
    }

    if (currentNormalized && currentOriginal) {

      const ids = line.match(/<@!?\d+>/g) || [];

      for (const id of ids){
        add(id, currentNormalized, currentOriginal);
      }
    }
  }

  const out = {};
  for (const id in sections) {

    out[id] = {};

    for (const [norm, originalsSet] of sections[id].entries()) {
      out[id][norm] = [...originalsSet];
    }
  }

  return out;
}

function compare(){

  const sup = extractSections(clean(document.getElementById("supervision").value));
  const ops = extractSections(clean(document.getElementById("operations").value));
  const result = document.getElementById("result");

  let output = "";
  let hasDifference = false;

  const getNorms = obj => new Set(Object.keys(obj || {}));

  const originalsForNorms = (obj, norms) => {
    const out = [];
    for (const n of norms) {
      const arr = obj[n] || [];
      for (const x of arr) out.push(x);
    }
    return [...new Set(out)];
  };

  Object.keys(sup).forEach(id => {

    if (!ops[id]) {

      hasDifference = true;

      output += `<div class='missing'>${id}</div>`;
      output += "موجود في الإشراف داخل:<br>";
      output += originalsForNorms(sup[id], Object.keys(sup[id])).join("<br>");
      output += "<hr>";
    }
  });

  Object.keys(ops).forEach(id => {

    if (!sup[id]) {

      hasDifference = true;

      output += `<div class='missing'>${id}</div>`;
      output += "موجود في العمليات داخل:<br>";
      output += originalsForNorms(ops[id], Object.keys(ops[id])).join("<br>");
      output += "<hr>";
    }
  });

  Object.keys(sup).forEach(id => {

    if (!ops[id]) return;

    const supSet = getNorms(sup[id]);
    const opsSet = getNorms(ops[id]);

    const onlyInSup = [...supSet].filter(x => !opsSet.has(x));
    const onlyInOps = [...opsSet].filter(x => !supSet.has(x));

    if (onlyInSup.length || onlyInOps.length) {

      hasDifference = true;

      output += `<div class='missing'>${id}</div>`;
      output += "⚠ موجود في التقريرين لكن التصنيف مختلف:<br><br>";

      if (onlyInSup.length){
        output += "<b>موجود في الإشراف فقط داخل:</b><br>";
        output += originalsForNorms(sup[id], onlyInSup).join("<br>") + "<br><br>";
      }

      if (onlyInOps.length){
        output += "<b>موجود في العمليات فقط داخل:</b><br>";
        output += originalsForNorms(ops[id], onlyInOps).join("<br><br>");
      }

      output += "<hr>";
    }
  });

  if (!hasDifference) {
    output = "<b>✔ لا يوجد أي اختلاف بين التقريرين</b>";
  }

  result.innerHTML = output;
}

</script>

</body>
</html>
</html>
