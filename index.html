<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مقارنة شاملة بين التقريرين</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  padding: 40px 20px;
  color: #fff;

  background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url("https://raw.githubusercontent.com/xhhp1/mechanics/main/images/mechan.png");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

h2 {
  text-align: center;
  margin-bottom: 30px;
  font-weight: 700;
}

.container {
  display: flex;
  gap: 25px;
  flex-wrap: wrap;
}

.box {
  flex: 1;
  min-width: 300px;
  padding: 20px;
  border-radius: 15px;

  background: rgba(30, 41, 59, 0.75);
  backdrop-filter: blur(12px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.box:hover { transform: translateY(-5px); }

h3 {
  margin-top: 0;
  margin-bottom: 15px;
  font-weight: 600;
}

textarea {
  width: 100%;
  height: 300px;
  padding: 15px;
  border-radius: 10px;
  border: none;
  resize: none;
  font-size: 14px;
  font-family: 'Cairo', sans-serif;
  background: rgba(15, 23, 42, 0.8);
  color: #fff;
  outline: none;
  transition: 0.3s;
}

textarea:focus { box-shadow: 0 0 0 2px #38bdf8; }

button {
  display: block;
  margin: 30px auto;
  padding: 14px 40px;
  border: none;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(99,102,241,0.6);
}

.result {
  margin-top: 30px;
  padding: 20px;
  border-radius: 15px;

  background: rgba(30, 41, 59, 0.75);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  min-height: 80px;
}

.result b { color: #22c55e; }

.missing {
  background: rgba(239,68,68,0.15);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  color: #ff6b6b;
  font-weight: bold;
}

hr {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.1);
  margin: 15px 0;
}

@media (max-width: 768px) {
  .container { flex-direction: column; }
}
</style>
</head>

<body>

<h2>📊 متابعة السجلات (تقارير العمليات - تقارير الاشراف)</h2>

<div class="container">
  <div class="box">
    <h3>تقرير الإشراف</h3>
    <textarea id="supervision" placeholder="الصق تقرير الإشراف هنا..."></textarea>
  </div>

  <div class="box">
    <h3>تقرير العمليات</h3>
    <textarea id="operations" placeholder="الصق تقرير العمليات هنا..."></textarea>
  </div>
</div>

<button onclick="compare()">قارن الآن</button>

<div class="result" id="result"></div>

<script>
function clean(text){
  return text
    .replace(/\*\*/g,"")
    .replace(/ـ+/g,"")
    .replace(/\[.*?\]\(.*?\)/g,""); // إزالة الروابط markdown
}

function normalizeLabel(label){
  // ✅ عناوين ثابتة لا تتغير إطلاقًا
  const fixedLabels = new Set([
    "مسؤول افتتاح المتجر",
    "المشرف الميداني بروم الكراج",
    "مشرف المنطقة بروم الكراج",
    "مشرف المتدرب بروم الكراج"
  ]);

  let raw = label
    .replace(/[()]/g, "")
    .replace(/ـ+/g, "")
    .replace(/\s+/g, " ")
    .trim();

  if (fixedLabels.has(raw)) return raw;

  // --------- باقي الدالة كما هي ----------
  label = raw;

  const map = {
    "القيادة": "القيادة",
    "قيادة": "القيادة",
    "قيادة الكراج": "القيادة",
    "قياده الكراج": "القيادة",

    "مستشار القائد": "مستشار القائد",

    "اشراف عام": "اشراف عام",
    "إشراف عام": "اشراف عام",
    "المشرف العام": "اشراف عام",

    "اشراف ميداني": "اشراف ميداني",
    "إشراف ميداني": "اشراف ميداني",
    "المشرف الميداني": "اشراف ميداني",

    "اشراف المناطق": "اشراف المناطق",
    "إشراف المناطق": "اشراف المناطق",
    "مشرفين المناطق": "اشراف المناطق",
    "مشرف المناطق": "اشراف المناطق",
    "مشرف المنطقة": "اشراف المناطق",

    "مشرفين متدربين": "مشرفين متدربين",
    "مشرفين متدربين ": "مشرفين متدربين",

    "لاعب معتمد": "المعتمدين",
    "السيدات و المعتمدين": "المعتمدين",
    "السيدات والمعتمدين": "المعتمدين",

    "العمليات": "العمليات",
    "نائب العمليات": "نائب العمليات",

    "مركز الإتصالات": "مركز الاتصالات",
    "مركز الإتصال": "مركز الاتصالات",
    "مركز الاتصالات": "مركز الاتصالات",

    "فني ميناء لوس": "فني ميناء لوس",
    "ميناء لوس": "فني ميناء لوس",

    "فني ميناء بوليتو": "فني ميناء بوليتو",
    "ميناء بوليتو": "فني ميناء بوليتو",

    "البحث والانقاذ": "البحث والانقاذ",
    "البحث والإنقاذ": "البحث والانقاذ",
  };

  if (map[label]) return map[label];

  let simplified = label
    .replace(/بروم الكراج/g, "")
    .replace(/الكراج/g, "")
    .replace(/\s+/g, " ")
    .trim();

  return map[simplified] || simplified;
}

function extractSections(text){
  const sections = {}; // id -> Set(labels)
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

  let currentLabel = null;
  const headerRegex = /^(.+?)\s*:\s*(.*)$/;

  for (let line of lines) {
    const m = line.match(headerRegex);

    if (m) {
      const rawLabel = m[1].trim();
      currentLabel = normalizeLabel(rawLabel);

      const rest = m[2] || "";
      const idsInline = rest.match(/<@\d+>/g) || [];

      for (const id of idsInline) {
        if (!sections[id]) sections[id] = new Set();
        sections[id].add(currentLabel);
      }
      continue;
    }

    // سطر تابع للعنوان السابق
    if (currentLabel) {
      const ids = line.match(/<@\d+>/g) || [];
      for (const id of ids) {
        if (!sections[id]) sections[id] = new Set();
        sections[id].add(currentLabel);
      }
    }
  }

  // Set -> Array
  const out = {};
  for (const id in sections) out[id] = [...sections[id]];
  return out;
}

function compare(){
  let supText = clean(document.getElementById("supervision").value);
  let opsText = clean(document.getElementById("operations").value);

  let supIDs = extractSections(supText);
  let opsIDs = extractSections(opsText);

  let result = document.getElementById("result");
  result.innerHTML = "";

  let hasDifference = false;

  // موجود في الإشراف ومش موجود في العمليات
  for (let id in supIDs){
    if(!opsIDs[id]){
      hasDifference = true;
      result.innerHTML += "<div class='missing'>" + id + "</div>";
      result.innerHTML += "موجود في الإشراف داخل:<br>";
      result.innerHTML += [...new Set(supIDs[id])].join("<br>");
      result.innerHTML += "<hr>";
    }
  }

  // موجود في العمليات ومش موجود في الإشراف
  for (let id in opsIDs){
    if(!supIDs[id]){
      hasDifference = true;
      result.innerHTML += "<div class='missing'>" + id + "</div>";
      result.innerHTML += "موجود في العمليات داخل:<br>";
      result.innerHTML += [...new Set(opsIDs[id])].join("<br>");
      result.innerHTML += "<hr>";
    }
  }

  // موجود في الاتنين لكن التصنيف مختلف (الفروق الدقيقة)
  for (let id in supIDs){
    if(!opsIDs[id]) continue;

    let supSet = new Set(supIDs[id].map(x => x.trim()).filter(Boolean));
    let opsSet = new Set(opsIDs[id].map(x => x.trim()).filter(Boolean));

    let onlyInSup = [...supSet].filter(x => !opsSet.has(x)).sort();
    let onlyInOps = [...opsSet].filter(x => !supSet.has(x)).sort();

    if (onlyInSup.length || onlyInOps.length){
      hasDifference = true;

      result.innerHTML += "<div class='missing'>" + id + "</div>";
      result.innerHTML += "⚠ موجود في التقريرين لكن التصنيف مختلف:<br><br>";

      if (onlyInSup.length){
        result.innerHTML += "<b>موجود في الإشراف فقط داخل:</b><br>";
        result.innerHTML += onlyInSup.join("<br>") + "<br><br>";
      }

      if (onlyInOps.length){
        result.innerHTML += "<b>موجود في العمليات فقط داخل:</b><br>";
        result.innerHTML += onlyInOps.join("<br>") + "<br><br>";
      }

      result.innerHTML += "<hr>";
    }
  }

  if(!hasDifference){
    result.innerHTML = "<b>✔ لا يوجد أي اختلاف بين التقريرين</b>";
  }
}
</script>

</body>
</html>
